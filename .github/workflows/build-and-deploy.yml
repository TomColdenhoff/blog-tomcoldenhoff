# Deterministic Hugo build → GitHub Pages (Actions deployment).
# Production URLs use hugo.toml baseURL (custom domain). Story 1.2 / 1.3.

name: build-and-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.158.0"
          extended: true

      - name: Validate published post frontmatter
        run: |
          set -euo pipefail
          node scripts/validate-published-posts.mjs --ci

      - name: Check published post slug stability (push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          set -euo pipefail
          node scripts/check-published-slug-stability.mjs --ci --base "${{ github.event.before }}" --head "${{ github.event.after }}"

      - name: Check published post slug stability (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          node scripts/check-published-slug-stability.mjs --ci

      - name: Validate Hugo project
        run: |
          set -euo pipefail
          if ! hugo config > /dev/null 2>&1; then
            echo "::error::Validate Hugo project — hugo config failed. Check hugo.toml, theme = 'PaperMod', and that themes/PaperMod is present (submodules: run git submodule update --init --recursive locally)."
            hugo config
            exit 1
          fi
          if ! hugo list all > /dev/null; then
            echo "::error::Validate Hugo project — hugo list all failed. Check content paths and frontmatter."
            hugo list all
            exit 1
          fi
          echo "Validate Hugo project — OK"

      - name: Build site
        env:
          HUGO_ENVIRONMENT: production
        run: |
          set -euo pipefail
          if ! hugo --gc --minify; then
            echo "::error::Build site failed. Check Hugo output above (theme, templates, content, submodule)."
            exit 1
          fi
          echo "Build site — OK"

      - name: Verify draft posts excluded from public output
        run: |
          set -euo pipefail
          node scripts/verify-draft-not-in-public.mjs --ci

      - name: Verify taxonomy list pages include baseline post
        run: |
          set -euo pipefail
          node scripts/verify-taxonomy-list-pages.mjs --ci

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
